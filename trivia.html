<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI計算 | マイウェブサイト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>私のポートフォリオサイト</h1>
        </header>
        <nav>
            <ul>
                <li><a href="index.html">ホーム</a></li>
                <li><a href="portfolio.html">作品集</a></li>
                <li><a href="trivia.html">便利機能</a></li>
            </ul>
        </nav>
        <div class="main-wrap">
            <aside class="sidebar-left">
                <h3>学習に役立つリンク</h3>
                <ul>
                    <li><a href="https://www.w3schools.com" target="_blank">W3Schools</a></li>
                    <li><a href="https://github.com" target="_blank">GitHub</a></li>
                    <li><a href="https://developer.mozilla.org" target="_blank">MDN Web Docs</a></li>
                    <li><a href="https://codepen.io" target="_blank">CodePen</a></li>
                </ul>
            </aside>
            <main class="content">
                <h2>BMI計算ツール</h2>
                <p>身長と体重を入力してBMI値と体型を確認しましょう。</p>
                <div class="bmi-box">
                    <label>身長(cm): </label>
                    <input type="number" id="height" placeholder="例：170">
                    <br>
                    <label>体重(kg): </label>
                    <input type="number" id="weight" placeholder="例：62">
                    <br>
                    <button onclick="calculateBMI()">計算する</button>
                    <div id="result"></div>
                </div>
            </main>
            <aside class="sidebar-right">
                <h3>お問い合わせ</h3>
                <form onsubmit="return checkForm()">
                    <label>名前</label>
                    <input type="text" id="name" placeholder="名前を入力">
                    <label>メールアドレス</label>
                    <input type="email" id="email" placeholder="メールアドレス">
                    <label>メッセージ</label>
                    <textarea rows="4" placeholder="コメントを記入してください"></textarea>
                    <button type="submit">送信</button>
                </form>
            </aside>
        </div>
        <footer>
            <p>作成年：2026年｜外部リンク：<a href="https://github.com" target="_blank">GitHub</a></p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
